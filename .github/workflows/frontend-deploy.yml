name: Frontend CI/CD

on:
  pull_request:
    paths:
      - "Frontend/spotify-oauth/**"
      - ".github/workflows/frontend-deploy.yml"
  push:
    branches:
      - main
    paths:
      - "Frontend/spotify-oauth/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend/spotify-oauth
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: Frontend/spotify-oauth/.nvmrc
          cache: npm
          cache-dependency-path: Frontend/spotify-oauth/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend/spotify-oauth
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: Frontend/spotify-oauth/.nvmrc
          cache: npm
          cache-dependency-path: Frontend/spotify-oauth/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SPLITIFY_FAC76 }}
          projectId: splitify-fac76
          channelId: live
          entryPoint: Frontend/spotify-oauth
